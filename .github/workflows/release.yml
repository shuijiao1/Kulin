name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build dashboard binaries
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            cc: x86_64-linux-gnu-gcc
          - goos: linux
            goarch: arm64
            cc: aarch64-linux-gnu-gcc
    steps:
      - uses: actions/checkout@v4

      - name: Install cross compilers
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: "1"
          CC: ${{ matrix.cc }}
        run: |
          mkdir -p dist
          go build -trimpath -buildvcs=false -ldflags="-s -w -X github.com/nezhahq/nezha/service/singleton.Version=${GITHUB_REF_NAME}" -o "dist/kulin-dashboard-${GOOS}-${GOARCH}" ./cmd/dashboard
          go build -trimpath -buildvcs=false -ldflags="-s -w" -o "dist/kulin-migrate-${GOOS}-${GOARCH}" ./cmd/migrate

      - name: Package binary
        run: |
          cd dist
          zip "kulin-dashboard-${{ matrix.goos }}-${{ matrix.goarch }}.zip" "kulin-dashboard-${{ matrix.goos }}-${{ matrix.goarch }}" "kulin-migrate-${{ matrix.goos }}-${{ matrix.goarch }}"

      - uses: actions/upload-artifact@v4
        with:
          name: kulin-dashboard-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/kulin-dashboard-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/kulin-migrate-${{ matrix.goos }}-${{ matrix.goarch }}
            dist/kulin-dashboard-${{ matrix.goos }}-${{ matrix.goarch }}.zip

  docker:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: kulin-dashboard-*
          path: dist-artifacts
          merge-multiple: true

      - name: Prepare dist
        run: |
          mkdir -p dist
          cp dist-artifacts/kulin-dashboard-linux-* dist/
          cp dist-artifacts/kulin-migrate-linux-* dist/
          chmod +x dist/kulin-dashboard-linux-* dist/kulin-migrate-linux-*

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ github.token }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/kulin-dashboard
          tags: |
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/') }}
            type=ref,event=tag
            type=sha,format=short

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    needs: [build, docker]
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: kulin-dashboard-*
          path: assets
          merge-multiple: true

      - uses: actions/checkout@v4

      - name: Keep release zips and install script
        run: |
          mkdir -p assets
          find assets -type f ! -name '*.zip' -delete
          cp scripts/install.sh assets/install.sh

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            assets/*.zip
            assets/install.sh
          generate_release_notes: true
